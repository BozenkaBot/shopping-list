services:
  lista-zakupow:
    build: .
    container_name: lista-zakupow
    environment:
      ADDR: ":8080"
      DB_PATH: "/data/shopping-list.sqlite"
    ports:
      - "8080:8080"
    volumes:
      - shopping_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  shopping_data:
