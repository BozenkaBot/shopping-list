<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista zakupów</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Listy zakupowe</p>
          <h1 id="activeListTitle">Lista zakupów</h1>
        </div>
        <button class="ghost-button" id="clearCompleted" type="button">Wyczyść kupione</button>
      </header>

      <section class="contexts" aria-label="Listy zakupów">
        <div class="contexts-header">
          <h2>Twoje listy</h2>
          <form id="createListForm" class="list-form">
            <input id="newListName" name="name" type="text" autocomplete="off" maxlength="80" placeholder="np. Dom" required>
            <button class="primary-button" type="submit">Dodaj listę</button>
          </form>
        </div>
        <div id="listsPanel" class="lists-panel" role="listbox" aria-label="Wybierz listę zakupów"></div>
        <form id="renameListForm" class="rename-form">
          <label>
            <span>Nazwa aktywnej listy</span>
            <input id="activeListName" name="name" type="text" autocomplete="off" maxlength="80" required>
          </label>
          <button class="ghost-button" type="submit">Zmień nazwę</button>
          <button class="danger-button" id="deleteList" type="button">Usuń listę</button>
        </form>
      </section>

      <section class="composer" aria-label="Dodaj produkt">
        <h2>Dodaj do listy <span id="composerListName">Lista zakupów</span></h2>
        <form id="addForm" class="add-form">
          <label>
            <span>Nazwa</span>
            <input id="nameInput" name="name" type="text" autocomplete="off" maxlength="120" placeholder="np. Pomidory" required>
          </label>
          <label>
            <span>Ilość / notatka</span>
            <input id="noteInput" name="note" type="text" autocomplete="off" maxlength="120" placeholder="np. 1 kg, pilne">
          </label>
          <button class="primary-button" type="submit">Dodaj</button>
        </form>
      </section>

      <section class="stats" aria-live="polite">
        <div>
          <strong id="totalCount">0</strong>
          <span>wszystkie</span>
        </div>
        <div>
          <strong id="openCount">0</strong>
          <span>do kupienia</span>
        </div>
        <div>
          <strong id="doneCount">0</strong>
          <span>kupione</span>
        </div>
      </section>

      <p id="message" class="message" role="status"></p>

      <section class="list-shell">
        <div id="emptyState" class="empty-state" hidden>
          <h2>Lista jest pusta</h2>
          <p>Dodaj pierwszą pozycję w aktywnej liście.</p>
        </div>
        <ul id="itemsList" class="items-list" aria-label="Pozycje listy zakupow"></ul>
      </section>
    </main>

    <template id="itemTemplate">
      <li class="item">
        <label class="check-wrap">
          <input class="item-check" type="checkbox">
          <span></span>
        </label>
        <div class="item-content">
          <form class="edit-form">
            <input class="edit-name" type="text" maxlength="120" required>
            <input class="edit-note" type="text" maxlength="120" placeholder="Ilość / notatka">
          </form>
          <div class="read-view">
            <strong class="item-name"></strong>
            <span class="item-note"></span>
          </div>
        </div>
        <div class="item-actions">
          <button class="icon-button edit-button" type="button" aria-label="Edytuj">Edytuj</button>
          <button class="icon-button save-button" type="button" aria-label="Zapisz" hidden>Zapisz</button>
          <button class="icon-button cancel-button" type="button" aria-label="Anuluj" hidden>Anuluj</button>
          <button class="icon-button delete-button" type="button" aria-label="Usuń">Usuń</button>
        </div>
      </li>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
